    A tabela apresenta a distribuição das mulheres por grupos de idade no Brasil referente ao ano de 2022, com
    detalhamento geográfico. Os dados revelam o perfil demográfico feminino em diferentes contextos territoriais, permitindo
    analisar a concentração de faixas etárias em áreas urbanas, rurais, terras indígenas, territórios quilombolas e comunidades
    urbanas.
