- name: Mulheres_Tabela_1_Frequencia_Escolar
  description: >
    A tabela apresenta a taxa bruta de frequência escolar no Brasil referente ao ano de 2022, organizada geograficamente
    desde o nível nacional até aos municípios. Os dados indicam a percentagem da população que frequenta o ensino formal,
    detalhada por sexo e subdividida em diferentes grupos de idade considerando a totalidade da população pesquisada sem qualquer
    distinção de cor.
