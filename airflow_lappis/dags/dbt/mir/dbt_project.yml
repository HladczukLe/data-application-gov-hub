name: 'mir'

version: 1.0.0
config-version: 2

profile: mir

model-paths: ["models"]
analysis-paths: ["analyses"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

models:
  mir: 
    +database: analysis
    metadata:
      +materialized: incremental
      +schema: metadata
    emendas_dbt:
      +materialized: table
      +schema: emendas
    parlamentares_dbt:
     +materialized: table
     +schema: parlamentares
    empenhos_ted_dbt:
     +materialized: table
     +schema: ted


on-run-start:
  - '{{create_udfs()}}'