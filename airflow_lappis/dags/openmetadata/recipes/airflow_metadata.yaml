source:
  type: airflow
  serviceName: airflow - local
  serviceConnection:
    config:
      type: Airflow
      hostPort: http://localhost:8080
      numberOfStatus: 20
      connection:
        type: Backend

  sourceConfig:
    config:
      type: PipelineMetadata

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: ${OM_HOST}
    authProvider: openmetadata
    securityConfig:
      jwtToken: ${INGESTION_TOKEN}